name: Gerar Boletim Semanal
on:
  schedule:
    - cron: "0 11 * * 1"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  gerar-boletim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: node scripts/generate.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Boletim Bot"
          git add data/boletim.json
          git diff --staged --quiet || git commit -m "Boletim $(date +'%d/%m/%Y')"
          git push
