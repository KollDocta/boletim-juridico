<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Boletim Jurídico Semanal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,300&display=swap" rel="stylesheet" />
<style>
  /* ── Tokens ─────────────────────────────────────────── */
  :root {
    --ink:       #1a1208;
    --ink-light: #4a3f30;
    --cream:     #f5f0e8;
    --parchment: #ede6d6;
    --rule:      #c8bfaa;
    --accent:    #8b1a1a;
    --accent-2:  #1a3a5c;
    --gold:      #b8860b;

    --stj:      #1a3a5c;
    --stf:      #2d6a4f;
    --migalhas: #8b3a00;
    --conjur:   #5a1a7a;

    --serif: "Playfair Display", Georgia, serif;
    --body:  "Source Serif 4", "Georgia", serif;

    --col-aside: 220px;
    --col-main:  1fr;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: var(--body);
    font-size: 16px;
    line-height: 1.7;
    min-height: 100vh;
  }

  /* ── Masthead ────────────────────────────────────────── */
  .masthead {
    background: var(--ink);
    color: var(--cream);
    padding: 0;
    border-bottom: 4px solid var(--gold);
  }

  .masthead-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px 24px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: end;
    gap: 16px;
  }

  .masthead-rule {
    height: 1px;
    background: var(--gold);
    max-width: 1100px;
    margin: 0 auto;
    opacity: 0.4;
  }

  .masthead-sub {
    max-width: 1100px;
    margin: 0 auto;
    padding: 8px 24px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.55);
  }

  .masthead h1 {
    font-family: var(--serif);
    font-size: clamp(28px, 4vw, 44px);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }

  .masthead h1 em {
    font-style: italic;
    color: var(--gold);
  }

  .masthead p.tagline {
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.6);
    margin-top: 6px;
  }

  .masthead-meta {
    text-align: right;
    font-size: 12px;
    color: rgba(245,240,232,0.5);
    letter-spacing: 0.05em;
  }

  .masthead-meta .edicao {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 700;
    color: var(--gold);
    display: block;
    line-height: 1;
    margin-bottom: 4px;
  }

  /* ── Toolbar ─────────────────────────────────────────── */
  .toolbar {
    background: var(--parchment);
    border-bottom: 1px solid var(--rule);
    padding: 12px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(26,18,8,0.08);
  }

  .toolbar-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .search-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    padding: 8px 16px 8px 36px;
    border: 1px solid var(--rule);
    border-radius: 4px;
    background: var(--cream);
    color: var(--ink);
    font-family: var(--body);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus { border-color: var(--accent); }

  .search-wrap::before {
    content: "⌕";
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-light);
    font-size: 18px;
    pointer-events: none;
  }

  .filter-group {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 5px 12px;
    border-radius: 3px;
    border: 1px solid var(--rule);
    background: transparent;
    font-family: var(--body);
    font-size: 12px;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--ink-light);
  }

  .filter-btn:hover { background: var(--cream); }
  .filter-btn.active {
    background: var(--ink);
    color: var(--cream);
    border-color: var(--ink);
  }

  .stats-bar {
    font-size: 12px;
    color: var(--ink-light);
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  /* ── Layout ──────────────────────────────────────────── */
  .main-layout {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px 64px;
    display: grid;
    grid-template-columns: var(--col-aside) var(--col-main);
    gap: 40px;
    align-items: start;
  }

  /* ── Aside ───────────────────────────────────────────── */
  .aside {
    position: sticky;
    top: 60px;
  }

  .aside-section {
    margin-bottom: 28px;
  }

  .aside-title {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-light);
    font-family: var(--body);
    font-weight: 600;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 12px;
  }

  .theme-nav a {
    display: block;
    font-size: 13px;
    color: var(--ink-light);
    text-decoration: none;
    padding: 4px 0;
    transition: color 0.15s;
    border-left: 2px solid transparent;
    padding-left: 10px;
    margin-left: -10px;
    line-height: 1.4;
  }

  .theme-nav a:hover, .theme-nav a.active {
    color: var(--accent);
    border-left-color: var(--accent);
  }

  .theme-nav .count {
    font-size: 11px;
    color: var(--rule);
    margin-left: 4px;
  }

  .fonte-legend { display: flex; flex-direction: column; gap: 6px; }

  .fonte-dot {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--ink-light);
  }

  .fonte-dot::before {
    content: "";
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--dot-color, var(--ink));
    flex-shrink: 0;
  }

  /* ── Content ─────────────────────────────────────────── */
  .content { min-width: 0; }

  .periodo-banner {
    background: var(--parchment);
    border: 1px solid var(--rule);
    border-left: 3px solid var(--gold);
    padding: 12px 16px;
    border-radius: 0 4px 4px 0;
    font-size: 13px;
    color: var(--ink-light);
    margin-bottom: 28px;
    letter-spacing: 0.02em;
  }

  .periodo-banner strong { color: var(--ink); font-weight: 600; }

  /* ── Tema Block ──────────────────────────────────────── */
  .tema-block {
    margin-bottom: 44px;
    animation: fadeIn 0.4s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .tema-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--ink);
  }

  .tema-titulo {
    font-family: var(--serif);
    font-size: 20px;
    font-weight: 700;
    color: var(--ink);
  }

  .tema-count {
    font-size: 12px;
    color: var(--ink-light);
    letter-spacing: 0.05em;
  }

  /* ── Article Card ────────────────────────────────────── */
  .artigo {
    background: white;
    border: 1px solid var(--rule);
    border-top: none;
    padding: 20px 22px 18px;
    position: relative;
    transition: box-shadow 0.2s;
  }

  .artigo:first-of-type { border-top: 1px solid var(--rule); }

  .artigo:hover { box-shadow: 0 4px 16px rgba(26,18,8,0.08); z-index: 1; }

  .artigo-header {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    margin-bottom: 10px;
  }

  .fonte-badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 2px;
    color: white;
    white-space: nowrap;
    margin-top: 3px;
    flex-shrink: 0;
  }

  .fonte-badge.stj      { background: var(--stj); }
  .fonte-badge.stf      { background: var(--stf); }
  .fonte-badge.migalhas { background: var(--migalhas); }
  .fonte-badge.conjur   { background: var(--conjur); }

  .artigo-titulo {
    font-family: var(--serif);
    font-size: 16px;
    font-weight: 700;
    line-height: 1.35;
    color: var(--ink);
    flex: 1;
  }

  .artigo-titulo a {
    color: inherit;
    text-decoration: none;
    transition: color 0.15s;
  }

  .artigo-titulo a:hover { color: var(--accent); }

  .artigo-meta {
    font-size: 11px;
    color: var(--rule);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .artigo-sintese {
    font-size: 14.5px;
    line-height: 1.75;
    color: var(--ink-light);
    border-left: 2px solid var(--parchment);
    padding-left: 14px;
    font-style: italic;
  }

  .artigo-sintese.highlight {
    border-left-color: var(--accent);
    color: var(--ink);
  }

  .artigo-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-top: 12px;
    font-size: 12px;
    color: var(--accent-2);
    text-decoration: none;
    letter-spacing: 0.04em;
    font-weight: 600;
    text-transform: uppercase;
    transition: gap 0.15s;
  }

  .artigo-link:hover { gap: 8px; }

  /* ── Empty state ─────────────────────────────────────── */
  .empty {
    text-align: center;
    padding: 64px 24px;
    color: var(--ink-light);
    font-style: italic;
    font-size: 16px;
  }

  /* ── Footer ──────────────────────────────────────────── */
  footer {
    background: var(--ink);
    color: rgba(245,240,232,0.45);
    font-size: 12px;
    text-align: center;
    padding: 24px;
    letter-spacing: 0.05em;
  }

  footer a { color: rgba(245,240,232,0.6); }

  /* ── Loading ─────────────────────────────────────────── */
  .loading {
    text-align: center;
    padding: 80px;
    color: var(--ink-light);
    font-style: italic;
  }

  /* ── Responsive ──────────────────────────────────────── */
  @media (max-width: 720px) {
    .main-layout {
      grid-template-columns: 1fr;
      padding: 20px 16px 48px;
    }
    .aside { position: static; display: none; }
    .masthead-inner { grid-template-columns: 1fr; }
    .masthead-meta { text-align: left; }
  }
</style>
</head>
<body>

<!-- ── Masthead ─────────────────────────────────────────── -->
<header class="masthead">
  <div class="masthead-inner">
    <div>
      <h1 id="titulo-site">Boletim <em>Jurídico</em></h1>
      <p class="tagline" id="subtitulo-site">Monitoramento semanal de jurisprudência e doutrina</p>
    </div>
    <div class="masthead-meta">
      <span class="edicao" id="edicao-num">—</span>
      <span id="data-edicao">Carregando…</span>
    </div>
  </div>
  <div class="masthead-rule"></div>
  <div class="masthead-sub">
    <span id="organizacao-nome"></span>
    <span>STJ · STF · Migalhas · ConJur</span>
  </div>
</header>

<!-- ── Toolbar ───────────────────────────────────────────── -->
<div class="toolbar">
  <div class="toolbar-inner">
    <div class="search-wrap">
      <input type="text" id="busca" placeholder="Buscar no boletim… (use E, OU, NÃO)" />
    </div>
    <div class="filter-group" id="filtros-fonte">
      <button class="filter-btn active" data-fonte="todos">Todos</button>
      <button class="filter-btn" data-fonte="stj">STJ</button>
      <button class="filter-btn" data-fonte="stf">STF</button>
      <button class="filter-btn" data-fonte="migalhas">Migalhas</button>
      <button class="filter-btn" data-fonte="conjur">ConJur</button>
    </div>
    <span class="stats-bar" id="stats-bar">—</span>
  </div>
</div>

<!-- ── Main ──────────────────────────────────────────────── -->
<div class="main-layout">
  <!-- Aside -->
  <aside class="aside">
    <div class="aside-section">
      <div class="aside-title">Temas desta edição</div>
      <nav class="theme-nav" id="theme-nav"></nav>
    </div>
    <div class="aside-section">
      <div class="aside-title">Fontes</div>
      <div class="fonte-legend">
        <span class="fonte-dot" style="--dot-color: var(--stj)">STJ</span>
        <span class="fonte-dot" style="--dot-color: var(--stf)">STF</span>
        <span class="fonte-dot" style="--dot-color: var(--migalhas)">Migalhas</span>
        <span class="fonte-dot" style="--dot-color: var(--conjur)">ConJur</span>
      </div>
    </div>
    <div class="aside-section">
      <div class="aside-title">Período</div>
      <div style="font-size:12px; color:var(--ink-light); line-height:1.6;" id="aside-periodo">—</div>
    </div>
  </aside>

  <!-- Content -->
  <main class="content">
    <div class="periodo-banner" id="periodo-banner">Carregando edição atual…</div>
    <div id="conteudo"><div class="loading">A carregar o boletim…</div></div>
  </main>
</div>

<!-- ── Footer ────────────────────────────────────────────── -->
<footer id="rodape">
  Gerado automaticamente com IA · <span id="footer-data"></span>
</footer>

<script>
// ────────────────────────────────────────────────────────
// Estado
// ────────────────────────────────────────────────────────
let boletim = null;
let config  = null;
let fonteAtiva = "todos";
let termoBusca = "";

// ────────────────────────────────────────────────────────
// Helpers
// ────────────────────────────────────────────────────────
function fmtData(iso) {
  if (!iso) return "—";
  const [y, m, d] = iso.split("T")[0].split("-");
  return `${d}/${m}/${y}`;
}

function slugify(str) {
  return str.toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9]+/g, "-");
}

// Busca booleana simples: suporta E, OU, NÃO
function testaFiltro(texto, query) {
  if (!query.trim()) return true;
  const t = texto.toLowerCase();

  // NÃO
  const partes = query.split(/\bNÃO\b/i);
  let base = partes[0];
  const excluidos = partes.slice(1).map(s => s.trim().toLowerCase());
  for (const ex of excluidos) {
    if (ex && t.includes(ex)) return false;
  }

  // E / OU
  if (/\bOU\b/i.test(base)) {
    return base.split(/\bOU\b/i).some(p => t.includes(p.trim().toLowerCase()));
  }
  if (/\bE\b/i.test(base)) {
    return base.split(/\bE\b/i).every(p => t.includes(p.trim().toLowerCase()));
  }
  return t.includes(base.trim().toLowerCase());
}

// ────────────────────────────────────────────────────────
// Render
// ────────────────────────────────────────────────────────
function renderBoletim() {
  if (!boletim) return;

  const conteudo = document.getElementById("conteudo");
  let totalVisiveis = 0;
  let html = "";

  for (const bloco of boletim.temas) {
    const artigosFiltrados = bloco.itens.filter(a => {
      if (fonteAtiva !== "todos" && a.fonte !== fonteAtiva) return false;
      const texto = [a.titulo, a.sintese, bloco.tema].join(" ");
      return testaFiltro(texto, termoBusca);
    });

    if (artigosFiltrados.length === 0) continue;
    totalVisiveis += artigosFiltrados.length;

    const id = slugify(bloco.tema);
    html += `
      <div class="tema-block" id="tema-${id}">
        <div class="tema-header">
          <h2 class="tema-titulo">${bloco.tema}</h2>
          <span class="tema-count">${artigosFiltrados.length} item${artigosFiltrados.length > 1 ? "s" : ""}</span>
        </div>`;

    for (const a of artigosFiltrados) {
      const destaque = a.relevancia >= 0.9 ? "highlight" : "";
      html += `
        <article class="artigo">
          <div class="artigo-header">
            <span class="fonte-badge ${a.fonte}">${a.fonteNome}</span>
            <h3 class="artigo-titulo">
              <a href="${a.url}" target="_blank" rel="noopener">${a.titulo}</a>
            </h3>
          </div>
          <div class="artigo-meta">${fmtData(a.data)}</div>
          <div class="artigo-sintese ${destaque}">${a.sintese}</div>
          <a class="artigo-link" href="${a.url}" target="_blank" rel="noopener">
            Ler na fonte →
          </a>
        </article>`;
    }

    html += `</div>`;
  }

  if (!html) {
    html = `<div class="empty">Nenhum item encontrado para os filtros selecionados.</div>`;
  }

  conteudo.innerHTML = html;
  document.getElementById("stats-bar").textContent =
    `${totalVisiveis} item${totalVisiveis !== 1 ? "s" : ""} exibido${totalVisiveis !== 1 ? "s" : ""}`;
}

// ────────────────────────────────────────────────────────
// Aside nav
// ────────────────────────────────────────────────────────
function renderNav() {
  if (!boletim) return;
  const nav = document.getElementById("theme-nav");
  nav.innerHTML = boletim.temas.map(b => {
    const id = slugify(b.tema);
    return `<a href="#tema-${id}">${b.tema} <span class="count">(${b.itens.length})</span></a>`;
  }).join("");
}

// ────────────────────────────────────────────────────────
// Cabeçalho
// ────────────────────────────────────────────────────────
function renderCabecalho() {
  if (!boletim) return;

  const ed = boletim.edicao || 1;
  const inicio = fmtData(boletim.periodo?.inicio);
  const fim    = fmtData(boletim.periodo?.fim);

  document.getElementById("edicao-num").textContent = `Nº ${String(ed).padStart(3, "0")}`;
  document.getElementById("data-edicao").textContent = fim;
  document.getElementById("periodo-banner").innerHTML =
    `Edição <strong>Nº ${ed}</strong> · Período: <strong>${inicio}</strong> a <strong>${fim}</strong> · <strong>${boletim.totalItens}</strong> itens em <strong>${boletim.temas.length}</strong> temas`;
  document.getElementById("aside-periodo").innerHTML = `${inicio}<br>a<br>${fim}`;
  document.getElementById("footer-data").textContent =
    `Gerado em ${new Date(boletim.geradoEm).toLocaleString("pt-BR")}`;

  if (config) {
    document.getElementById("titulo-site").innerHTML =
      config.boletim.titulo.replace(/(\w+)$/, "<em>$1</em>");
    document.getElementById("subtitulo-site").textContent = config.boletim.subtitulo;
    document.getElementById("organizacao-nome").textContent = config.boletim.organizacao;
  }
}

// ────────────────────────────────────────────────────────
// Init
// ────────────────────────────────────────────────────────
async function init() {
  try {
    // Carregar config (opcional — para o cabeçalho)
    try {
      const rc = await fetch("config.json");
      config = await rc.json();
    } catch (_) {}

    // Carregar boletim
    const res = await fetch("data/boletim.json?v=" + Date.now());
    boletim = await res.json();

    renderCabecalho();
    renderNav();
    renderBoletim();
  } catch (err) {
    document.getElementById("conteudo").innerHTML =
      `<div class="empty">Não foi possível carregar o boletim.<br><small>${err.message}</small></div>`;
  }
}

// ────────────────────────────────────────────────────────
// Eventos
// ────────────────────────────────────────────────────────
document.getElementById("busca").addEventListener("input", e => {
  termoBusca = e.target.value;
  renderBoletim();
});

document.getElementById("filtros-fonte").addEventListener("click", e => {
  const btn = e.target.closest("[data-fonte]");
  if (!btn) return;
  fonteAtiva = btn.dataset.fonte;
  document.querySelectorAll("[data-fonte]").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderBoletim();
});

// Highlight do tema ativo no aside ao rolar
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const id = entry.target.id.replace("tema-", "");
      document.querySelectorAll(".theme-nav a").forEach(a => {
        a.classList.toggle("active", a.getAttribute("href") === `#tema-${id}`);
      });
    }
  });
}, { threshold: 0.3 });

// Re-observe depois de render
const origRender = renderBoletim;
window.renderBoletim = function() {
  origRender();
  document.querySelectorAll(".tema-block").forEach(el => observer.observe(el));
};

init();
</script>
</body>
</html>
