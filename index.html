<style>
:root {
  --ink:#0a1628;--ink-mid:#1a2e4a;--ink-light:#2d4a6e;
  --cream:#f0f4f9;--parchment:#e2eaf4;--rule:#a8bed8;
  --accent:#1a4a8c;--accent-2:#0d6efd;--gold:#c9a84c;
  --stj:#1a3a5c;--stf:#1a5c3a;--migalhas:#5c2a1a;
  --conjur:#2a1a5c;--irib:#1a4a5c;--anoreg:#3a1a5c;--cnj:#8c1a1a;
  --serif:"Playfair Display",Georgia,serif;
  --body:"Source Serif 4",Georgia,serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--cream);color:var(--ink);font-family:var(--body);font-size:16px;line-height:1.7}
.masthead{background:linear-gradient(135deg,#0a1628 0%,#1a2e4a 60%,#1a3a6a 100%);color:#e8f0fb;border-bottom:3px solid var(--gold)}
.masthead-inner{max-width:1100px;margin:0 auto;padding:28px 24px 20px;display:grid;grid-template-columns:1fr auto;align-items:end;gap:16px}
.masthead h1{font-family:var(--serif);font-size:clamp(26px,4vw,42px);font-weight:700;letter-spacing:-0.02em;line-height:1.1;color:#e8f0fb}
.masthead h1 em{font-style:italic;color:var(--gold)}
.masthead h1 .koll{color:var(--gold)}
.masthead p.tagline{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:rgba(232,240,251,.55);margin-top:6px}
.masthead-meta{text-align:right;font-size:12px;color:rgba(232,240,251,.45)}
.masthead-meta .edicao{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--gold);display:block;line-height:1;margin-bottom:4px}
.masthead-sub{max-width:1100px;margin:0 auto;padding:8px 24px 18px;display:flex;justify-content:space-between;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:rgba(232,240,251,.4);border-top:1px solid rgba(201,168,76,.25)}
.toolbar{background:var(--parchment);border-bottom:1px solid var(--rule);padding:10px 24px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(10,22,40,.1)}
.toolbar-inner{max-width:1100px;margin:0 auto;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.search-wrap{flex:1;min-width:180px;position:relative}
.search-wrap input{width:100%;padding:7px 14px 7px 34px;border:1px solid var(--rule);border-radius:4px;background:white;color:var(--ink);font-family:var(--body);font-size:14px;outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--accent)}
